<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-layout">

      <!-- ── Sidebar ── -->
      <aside class="sidebar" id="sidebar">
        <button class="new-gen-btn" id="new-gen-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          <span>새 생성</span>
        </button>

        <div class="tab-switch" id="tab-switch">
          <button type="button" class="tab-btn active" data-tab="ai">AI 이미지</button>
          <button type="button" class="tab-btn" data-tab="stock">주식 분석</button>
        </div>

        <div class="sidebar-section">
          <p class="section-title">설정</p>

          <!-- AI 이미지 생성 설정 -->
          <div class="setting-group ai-only">
            <label class="setting-label">모델</label>
            <select id="model-id" class="setting-select"></select>
          </div>

          <div class="setting-group ai-only">
            <label class="setting-label">스타일 프리셋</label>
            <select id="style-preset" class="setting-select">
              <option value="none">기본</option>
              <option value="finance_poster">금융 포스터</option>
              <option value="infographic">인포그래픽</option>
            </select>
          </div>

          <div class="setting-group ai-only">
            <label class="setting-label">출력 타입</label>
            <select id="output-type" class="setting-select">
              <option value="image">이미지</option>
              <option value="video">동영상 미리보기</option>
            </select>
          </div>

          <div class="setting-group ai-only image-only">
            <label class="setting-label">Width</label>
            <input id="width" type="number" min="256" max="1536" step="64" value="768" class="setting-input" />
          </div>

          <div class="setting-group ai-only image-only">
            <label class="setting-label">Height</label>
            <input id="height" type="number" min="256" max="1536" step="64" value="768" class="setting-input" />
          </div>

          <div class="setting-group ai-only video-only hidden">
            <label class="setting-label">동영상 사이즈</label>
            <select id="video-size" class="setting-select">
              <option value="square">정사각형 (768×768)</option>
              <option value="landscape">가로형 (1024×576)</option>
              <option value="portrait">세로형 (576×1024)</option>
            </select>
          </div>

          <!-- 주식 차트 분석 설정 -->
          <div class="setting-group stock-only hidden">
            <label class="setting-label">차트 종류</label>
            <select id="chart-type" class="setting-select">
              <option value="candle">캔들스틱</option>
              <option value="line">라인</option>
              <option value="infographic">인포그래픽</option>
            </select>
          </div>

          <div class="setting-group stock-only hidden">
            <label class="setting-label">기간</label>
            <select id="period" class="setting-select">
              <option value="1mo">1개월</option>
              <option value="3mo">3개월</option>
              <option value="6mo" selected>6개월</option>
              <option value="1y">1년</option>
              <option value="2y">2년</option>
              <option value="5y">5년</option>
            </select>
          </div>

          <div class="setting-group stock-only hidden">
            <label class="setting-label">간격</label>
            <select id="interval" class="setting-select">
              <option value="1d" selected>일봉</option>
              <option value="1wk">주봉</option>
              <option value="1mo">월봉</option>
            </select>
          </div>

          <div class="setting-group stock-only hidden">
            <label class="setting-label">보조지표</label>
            <div class="indicator-list">
              <label class="indicator-item"><input type="checkbox" value="sma20" checked /> SMA20</label>
              <label class="indicator-item"><input type="checkbox" value="sma60" /> SMA60</label>
              <label class="indicator-item"><input type="checkbox" value="ema20" /> EMA20</label>
              <label class="indicator-item"><input type="checkbox" value="bollinger" /> 볼린저밴드</label>
              <label class="indicator-item"><input type="checkbox" value="rsi" /> RSI</label>
              <label class="indicator-item"><input type="checkbox" value="macd" /> MACD</label>
              <label class="indicator-item"><input type="checkbox" value="volume" checked /> 거래량</label>
            </div>
          </div>
        </div>
      </aside>

      <!-- ── Main wrapper ── -->
      <div class="main-wrapper">

        <!-- Topbar -->
        <header class="topbar">
          <button class="icon-btn" id="sidebar-toggle" aria-label="메뉴 열기/닫기">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div class="topbar-brand">
            <svg class="brand-star" width="22" height="22" viewBox="0 0 24 24">
              <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z" fill="url(#topGrad)"/>
              <defs>
                <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#4285f4"/>
                  <stop offset="50%" stop-color="#9b72cb"/>
                  <stop offset="100%" stop-color="#d96570"/>
                </linearGradient>
              </defs>
            </svg>
            <span>Image Studio</span>
          </div>
        </header>

        <!-- Content area -->
        <main class="main-content">

          <!-- Welcome screen -->
          <div class="welcome" id="welcome-screen">
            <div class="welcome-icon">
              <svg width="60" height="60" viewBox="0 0 24 24">
                <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z" fill="url(#welcomeGrad)"/>
                <defs>
                  <linearGradient id="welcomeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#4285f4"/>
                    <stop offset="50%" stop-color="#9b72cb"/>
                    <stop offset="100%" stop-color="#d96570"/>
                  </linearGradient>
                </defs>
              </svg>
            </div>
            <h1 class="welcome-heading">
              <span class="grad-text ai-only" id="welcome-heading-ai">무엇을 만들어볼까요?</span>
              <span class="grad-text stock-only hidden" id="welcome-heading-stock">어떤 종목을 분석할까요?</span>
            </h1>
            <p class="welcome-sub ai-only" id="welcome-sub-ai">프롬프트를 입력하면 AI가 이미지를 생성합니다</p>
            <p class="welcome-sub stock-only hidden" id="welcome-sub-stock">종목 코드를 입력하면 실시간 시세로 차트를 생성합니다 (예: AAPL, 005930.KS)</p>
          </div>

          <!-- Result screen -->
          <div class="result-area hidden" id="result-screen">
            <div class="prompt-bubble" id="result-prompt"></div>
            <div class="result-card">
              <div class="result-header">
                <svg width="16" height="16" viewBox="0 0 24 24">
                  <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z" fill="url(#cardGrad)"/>
                  <defs>
                    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#4285f4"/>
                      <stop offset="100%" stop-color="#9b72cb"/>
                    </linearGradient>
                  </defs>
                </svg>
                <span class="result-label">Image Studio</span>
              </div>
              <p class="result-status" id="status"></p>
              <div class="summary-grid hidden" id="summary-grid"></div>
              <img id="result-image" class="result-image hidden" alt="생성 결과" />
            </div>
          </div>

        </main>

        <!-- Input area -->
        <div class="input-area">
          <form id="generate-form">
            <div class="prompt-box">
              <textarea
                id="prompt"
                class="prompt-input ai-only"
                rows="1"
                placeholder="이미지를 묘사해보세요..."
              ></textarea>
              <input
                id="ticker-input"
                class="prompt-input stock-only hidden"
                type="text"
                placeholder="종목 코드를 입력하세요 (예: AAPL, 005930.KS)"
              />
              <button type="submit" id="submit-button" class="send-btn" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
              </button>
            </div>
          </form>
          <p class="disclaimer ai-only" id="disclaimer-ai">AI가 생성하는 콘텐츠는 실제와 다를 수 있습니다</p>
          <p class="disclaimer stock-only hidden" id="disclaimer-stock">실시간 시세 기반 차트이며 투자 판단의 근거로 사용할 수 없습니다</p>
          <footer class="footer">(주)에듀엠지티 &nbsp;|&nbsp; <a href="https://www.edumgt.co.kr" target="_blank" rel="noopener">www.edumgt.co.kr</a></footer>
        </div>

      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
